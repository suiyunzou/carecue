services:
  postgres:
    image: postgres:17-alpine
    container_name: carecue-postgres
    restart: unless-stopped
    ports:
      - "5500:5432"
    environment:
      POSTGRES_USER: carecue
      POSTGRES_PASSWORD: carecue
      POSTGRES_DB: carecue
    volumes:
      - carecue-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carecue -d carecue"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: carecue-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://carecue:carecue@postgres:5432/carecue?schema=public
      - PORT=4300
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - AI_ENABLED=${AI_ENABLED}
      - LLM_PRIMARY_PROVIDER=${LLM_PRIMARY_PROVIDER}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - OPENROUTER_FALLBACK_MODEL=${OPENROUTER_FALLBACK_MODEL}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER}
      - OPENROUTER_APP_TITLE=${OPENROUTER_APP_TITLE}
      - OPENROUTER_JSON_SCHEMA=${OPENROUTER_JSON_SCHEMA}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS}
      - AGENT_INTERACTIVE_LLM_BUDGET_MS=${AGENT_INTERACTIVE_LLM_BUDGET_MS}
      - AGENT_INTERACTIVE_TOOL_TIMEOUT_MS=${AGENT_INTERACTIVE_TOOL_TIMEOUT_MS}
      - AGENT_HYPOTHESIS_LLM_BUDGET_MS=${AGENT_HYPOTHESIS_LLM_BUDGET_MS}
      - AGENT_HYPOTHESIS_TOOL_TIMEOUT_MS=${AGENT_HYPOTHESIS_TOOL_TIMEOUT_MS}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
      # 限制 Node.js 内存使用，防止在 2G 机器上 OOM 导致进程被杀
      - NODE_OPTIONS=--max-old-space-size=512
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && npx tsx server/index.ts"
    deploy:
      resources:
        limits:
          memory: 800M

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: carecue-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 300M

volumes:
  carecue-postgres-data:
