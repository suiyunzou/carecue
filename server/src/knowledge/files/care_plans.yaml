# 症状组合 → 护理建议（非处方、生活方式）。
# 不写药物剂量；只写可安全自我执行的护理动作。
- symptoms: [头晕, 胸闷]
  advice:
    - 改变体位时放慢动作，先在床边坐一会儿再起身，避免突然站立
    - 规律作息、保证睡眠，避免熬夜与过度劳累
    - 适量补充水分，避免长时间空腹或一次性大量饮酒、浓茶、咖啡
    - 发作时停下手中事情，坐下或半躺、放松深呼吸，记录发作时间与诱因
- symptoms: [头痛]
  advice:
    - 规律作息、避免熬夜与长时间用眼，注意颈肩与眼睛放松
    - 记录头痛的部位、性质、诱因（咖啡因、月经、压力、睡眠）与缓解方式
    - 保证饮水，避免空腹与过量咖啡因，减少屏幕连续使用时间
- symptoms: [腹痛]
  advice:
    - 清淡饮食、少量多餐，暂时避开油腻、辛辣与生冷食物
    - 注意补充水分与电解质，留意大便性状与排便情况
    - 记录腹痛部位、与进食或排便的关系以及伴随症状
# 找不到匹配时使用的通用建议
- symptoms: [默认]
  advice:
    - 注意休息，记录症状的发作时间、诱因与缓解方式
    - 保持规律作息与充足水分，避免已知诱因
