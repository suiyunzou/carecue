# 症状组合 → 护理建议（非处方、生活方式）。
# 不写药物剂量；只写可安全自我执行的护理动作。
- symptoms: [头晕, 胸闷]
  advice:
    - 改变体位时放慢动作，先在床边坐一会儿再起身，避免突然站立
    - 规律作息、保证睡眠，避免熬夜与过度劳累
    - 适量补充水分，避免长时间空腹或一次性大量饮酒、浓茶、咖啡
    - 发作时停下手中事情，坐下或半躺、放松深呼吸，记录发作时间与诱因
- symptoms: [头痛]
  advice:
    - 规律作息、避免熬夜与长时间用眼，注意颈肩与眼睛放松
    - 记录头痛的部位、性质、诱因（咖啡因、月经、压力、睡眠）与缓解方式
    - 保证饮水，避免空腹与过量咖啡因，减少屏幕连续使用时间
- symptoms: [腹痛]
  advice:
    - 清淡饮食、少量多餐，暂时避开油腻、辛辣与生冷食物
    - 注意补充水分与电解质，留意大便性状与排便情况
    - 记录腹痛部位、与进食或排便的关系以及伴随症状
- symptoms: [发热]
  advice:
    - 多休息、多饮温水，按体感增减衣物，避免捂汗
    - 监测并记录体温变化与伴随症状（如咳嗽、腹泻、皮疹）
    - 清淡易消化饮食，注意补充水分与电解质
- symptoms: [咳嗽]
  advice:
    - 多饮温水、保持室内空气湿润，远离烟雾与刺激性气味
    - 记录咳嗽的性质（干咳/有痰）、痰的颜色与诱发因素
    - 注意休息，避免过度用嗓与剧烈运动
- symptoms: [皮疹]
  advice:
    - 避免抓挠与热水烫洗，穿宽松棉质衣物，回避近期新接触的可疑致敏物
    - 记录皮疹出现时间、分布、是否瘙痒及与食物/药物/接触史的关系
    - 保持皮肤清洁干燥，必要时冷敷缓解瘙痒
- symptoms: [腹泻]
  advice:
    - 少量多次补充口服补液或淡盐水，预防脱水
    - 清淡饮食、暂避油腻生冷与乳制品，注意手卫生与餐具清洁
    - 记录排便次数、性状以及是否带血或黏液
- symptoms: [咽喉痛]
  advice:
    - 多饮温水、用淡盐水漱口，保持室内湿润，避免烟酒与辛辣
    - 注意休息与声带放松，记录是否伴发烧、咳嗽
    - 清淡温软饮食，避免过烫过硬食物刺激咽喉
- symptoms: [腰背痛]
  advice:
    - 避免久坐久站与突然弯腰提重，注意坐姿与睡姿，必要时短期适度休息
    - 急性期可在可耐受范围内适度活动，避免长期卧床
    - 记录疼痛部位、诱因、放射方向及与活动/休息的关系
- symptoms: [眼睛不适]
  advice:
    - 减少屏幕连续使用，遵循用眼间歇休息，避免揉眼
    - 注意用眼卫生，隐形眼镜佩戴者暂停佩戴并检查镜片
    - 记录不适性质（疼痛/异物感/视力变化）、单双眼及诱因
# 找不到匹配时使用的通用建议
- symptoms: [默认]
  advice:
    - 注意休息，记录症状的发作时间、诱因与缓解方式
    - 保持规律作息与充足水分，避免已知诱因
